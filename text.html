<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>WINTER'S EMBRACE 2027</title>
  <style>
    body { margin: 0; background: #050505; color: #00ff08; font-family: 'Courier New', monospace; }
    
    /* Line-Up Karten Design (Referenz) */
    .lineup-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 40px; }
    .lineup-card { 
        background: rgba(20, 20, 20, 0.8); 
        border: 1px solid #333; 
        padding: 20px; 
        display: flex; 
        align-items: center; 
        gap: 20px;
        transition: 0.3s;
    }
    .lineup-card:hover { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }
    .artist-img { width: 100px; height: 100px; border-radius: 5px; object-fit: cover; border: 1px solid #00ff08; }
    .artist-info h3 { margin: 0; color: #fff; }
    .artist-info p { margin: 5px 0; font-size: 0.9rem; color: #aaa; }
    .time { color: #00ff08; font-weight: bold; }
  </style>
</head>
<body>

  <div class="lineup-container">
    <div class="lineup-card">
        <img src="https://r2.guns.lol/315ca1f2-f200-4a1c-863b-e412a4d7903c.webp" class="artist-img">
        <div class="artist-info">
            <h3>NUIK</h3>
            <p>Viking Electro</p>
            <div class="time">19:00 - 20:00</div>
        </div>
    </div>

    <div class="lineup-card">
        <img src="https://r2.guns.lol/315ca1f2-f200-4a1c-863b-e412a4d7903c.webp" class="artist-img">
        <div class="artist-info">
            <h3>DASPRID</h3>
            <p>Rock and Metal</p>
            <div class="time">20:00 - 21:00</div>
        </div>
    </div>
  </div>

</body>
</html>
