<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WINTER'S EMBRACE 2027 | STELLWERK HAMBURG</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Courier New', Courier, monospace; color: #e6f1ff; background: #050505; }
    
    /* Video Background */
    .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(25%); }
    
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 100px 20px; text-transform: uppercase; }
    h1 { font-size: 4rem; color: #00ff08; text-shadow: 0 0 20px #ff0000; margin: 0; }
    
    /* Referenz-Layout (Karten) */
    .lineup-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 40px; }
    .lineup-card { 
        background: rgba(20, 20, 20, 0.85); border: 1px solid #333; padding: 20px; 
        display: flex; align-items: center; gap: 20px; transition: 0.3s;
    }
    .lineup-card:hover { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); }
    .artist-img { width: 80px; height: 80px; border-radius: 5px; border: 1px solid #00ff08; object-fit: cover; }
    .time { color: #00ff08; font-weight: bold; margin-top: 5px; }
    
    .btn-wild { 
        display: block; width: 250px; margin: 40px auto; padding: 15px; background: #ff0000; 
        color: white; text-align: center; text-decoration: none; font-weight: 900; cursor: crosshair; 
    }
    footer { text-align: center; padding: 50px; color: #888; }
  </style>
</head>
<body>

  <iframe class="video-bg" src="https://www.youtube.com/embed/Of7w9SiKjic?autoplay=1&mute=1&loop=1&playlist=Of7w9SiKjic&controls=0&showinfo=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>

  <div class="container">
    <header>
      <h1>Winter's Embrace</h1>
      <p>15.01 + 16.01.2027 | STELLWERK HAMBURG</p>
      <a href="#" class="btn-wild">Tickets & Info</a>
    </header>

    <h2 style="text-align: center; color: #00ff08;">LINE UP 2027</h2>
    
    <div class="lineup-container">
      <div class="lineup-card">
        <img src="https://r2.guns.lol/315ca1f2-f200-4a1c-863b-e412a4d7903c.webp" class="artist-img">
        <div>
          <h3>NUIK</h3>
          <p>Viking Electro</p>
          <div class="time">19:00 - 20:00</div>
        </div>
      </div>
      <div class="lineup-card">
        <img src="https://r2.guns.lol/315ca1f2-f200-4a1c-863b-e412a4d7903c.webp" class="artist-img">
        <div>
          <h3>DASPRID</h3>
          <p>Rock and Metal</p>
          <div class="time">20:00 - 21:00</div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>In cooperation with Eurofurence e.V. | Supported by HanseFurs e.V.</p>
  </footer>

</body>
</html>
