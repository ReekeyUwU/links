<style>
    /* ... (dein restliches CSS) ... */

    /* Neues, schöneres Age Gate Styling */
    .age-gate-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 5, 5, 0.95); z-index: 9999;
      display: none; justify-content: center; align-items: center; padding: 20px;
    }
    .age-gate-box {
      background: rgba(25, 15, 35, 0.95);
      border: 2px solid rgba(0, 255, 8, 0.3);
      border-radius: 20px; padding: 40px; text-align: center;
      max-width: 400px; box-shadow: 0 0 40px rgba(240, 15, 214, 0.3);
    }
    .age-gate-box h2 { color: #fff; margin-bottom: 20px; font-size: 24px; }
    .btn-yes { 
      padding: 12px 35px; border-radius: 30px; background: #00ff08; color: #050505; 
      border: none; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px;
    }
    .btn-yes:hover { background: #fff; transform: scale(1.05); }
    .btn-no { 
      padding: 12px 35px; border-radius: 30px; background: transparent; color: #fff; 
      border: 1px solid rgba(255, 255, 255, 0.3); cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px;
    }
    .btn-no:hover { background: rgba(255, 255, 255, 0.1); }
</style>

<div id="age-gate" class="age-gate-overlay">
  <div class="age-gate-box">
    <h2>Confirm Age</h2>
    <p style="color:rgba(255,255,255,0.7); margin-bottom: 25px;">Are you 18 years or older?</p>
    <button class="btn-yes" onclick="go()">Yes, I am 18+</button>
    <button class="btn-no" onclick="hide()">Close</button>
  </div>
</div>
