  <script>
    let url = "";
    const TRACKER_URL = 'https://link-tracker.morning-surf-02e1.workers.dev/track';
    const SPOTIFY_WORKER_URL = 'https://tight-firefly-dfcf.morning-surf-02e1.workers.dev/'; 

    function countView() {
        if (!sessionStorage.getItem('viewed_reekey')) {
            fetch(TRACKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ link: 'reekey_de_views' }) })
            .then(() => sessionStorage.setItem('viewed_reekey', 'true'))
            .catch(e => console.error(e));
        }
    }
    countView();

    function track(name, u) {
      fetch(TRACKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ link: name }) }).catch(e => console.error(e));
      if (u) window.open(u, '_blank');
    }

    function gate(u, name) { 
      url = u; 
      fetch(TRACKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ link: name }) }).catch(e => console.error(e));
      const el = document.getElementById('age-gate');
      el.style.display = 'flex';
      setTimeout(() => el.classList.add('open'), 10); 
    }
    
    function hide() { 
      const el = document.getElementById('age-gate');
      el.classList.remove('open');
      setTimeout(() => el.style.display = 'none', 300); 
    }
    
    function go() { window.open(url, '_blank'); hide(); }

    fetch('https://empty-rice-011f.morning-surf-02e1.workers.dev/')
      .then(res => res.text())
      .then(data => { document.getElementById('view-count').innerText = data; })
      .catch(err => { document.getElementById('view-count').innerText = "—"; });

    async function updateStatus() {
        try {
            const res = await fetch('https://api.lanyard.rest/v1/users/1104903295438434365');
            const json = await res.json();
            if (json.success) {
                const d = json.data;
                document.getElementById('widget-dot').style.backgroundColor = { 'online': '#43b581', 'idle': '#faa61a', 'dnd': '#f04747', 'offline': '#747f8d' }[d.discord_status] || '#747f8d';
                const game = d.activities.find(a => a.type === 0);
                document.getElementById('widget-activity').innerText = game ? `🎮 ${game.name}` : d.discord_status.charAt(0).toUpperCase() + d.discord_status.slice(1);
            }
        } catch(e) { console.error(e); }
    }

    async function updateMusicStatus() {
        try {
            const res = await fetch(SPOTIFY_WORKER_URL);
            const data = await res.json();
            const m = document.getElementById('music-widget');
            
            if (data.status === "idle" || !data.item || data.is_playing === false) {
                m.innerText = "🔇 Läuft gerade nichts";
            } else {
                const song = data.item.name;
                const artist = data.item.artists[0].name;
                m.innerText = `🎵 Listening on Spotify: ${song} – ${artist}`;
            }
        } catch(e) { 
            console.error("Spotify-Fehler:", e);
            document.getElementById('music-widget').innerText = "🔇 Läuft gerade nichts";
        }
    }
    
    updateStatus();
    updateMusicStatus();
    
    setInterval(updateStatus, 10000);
    setInterval(updateMusicStatus, 30000);
  </script>
