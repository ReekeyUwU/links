<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body, html {
      margin: 0; padding: 0; width: 100%; min-height: 100vh;
      background-color: #050505; color: #00ff08;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
    }
    .bg-layer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("https://r2.guns.lol/84bdc93d-a924-42a8-829d-8ceafa6314fd.webp");
      background-size: cover; background-position: center; z-index: 1;
    }
    .main-wrapper {
      position: relative; z-index: 2; min-height: 100vh; width: 100%;
      display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .profile-card {
      width: 100%; max-width: 640px;
      background: rgba(240, 15, 214, 0.15);
      backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
      border-radius: 20px; border: 2px solid rgba(240, 15, 214, 0.1);
      padding: 35px 25px 50px 25px; text-align: center; position: relative;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    
    /* Haupt-Avatar (Eckig-gerundet im App-Style) */
    .avatar-box {
      width: 130px; height: 130px; margin: 0 auto 20px auto; position: relative;
    }
    .avatar-img {
      width: 100%; height: 100%; border-radius: 35px; object-fit: cover;
      border: 3px solid rgba(240, 15, 214, 0.4);
      box-shadow: 0 0 25px rgba(0, 255, 8, 0.5);
      transition: all 0.3s ease;
    }
    
    /* Rahmen-Glow gesteuert über Discord-Status */
    .status-online { border-color: #43b581; box-shadow: 0 0 25px rgba(67, 181, 129, 0.9); }
    .status-idle { border-color: #faa61a; box-shadow: 0 0 25px rgba(250, 166, 26, 0.9); }
    .status-dnd { border-color: #f04747; box-shadow: 0 0 25px rgba(240, 71, 71, 0.9); }
    .status-offline { border-color: rgba(240, 15, 214, 0.4); box-shadow: 0 0 25px rgba(0, 255, 8, 0.5); }

    h1 {
      font-size: 39.5px; font-weight: 600; margin: 0 0 5px 0;
      color: #00ff08; text-shadow: 0 0 16.5px #00ff08;
      display: inline-flex; align-items: center; gap: 8px;
      background-image: url("https://assets.guns.lol/sparkle_green.gif");
    }
    .verified-icon {
      color: #00ff08; font-size: 24px; filter: drop-shadow(0 0 5px #00ff08);
    }
    .sub-bio {
      color: rgba(0,255,8,0.6); font-size: 16px; margin: 5px 0 20px 0;
    }

    /* Das originale Guns.lol Discord Live-Widget (Mattes, flaches Design) */
    .guns-discord-widget {
      background: rgba(255, 255, 255, 0.07);
      border-radius: 18px;
      padding: 10px 16px;
      margin: 0 auto 25px auto;
      width: 100%;
      max-width: 310px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .widget-pfp-container {
      position: relative;
      width: 42px; height: 42px;
      flex-shrink: 0;
    }
    .widget-pfp {
      width: 100%; height: 100%;
      border-radius: 50%; /* Absolut kreisrund im Widget */
      object-fit: cover;
    }
    /* Der kleine Statuspunkt unten rechts am runden Widget-Bild */
    .widget-status-dot {
      position: absolute; bottom: 0; right: 0;
      width: 13px; height: 13px;
      border-radius: 50%;
      background-color: #747f8d;
      border: 2px solid rgba(35, 25, 45, 1);
    }
    .widget-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .widget-user-line {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #00ff08;
    }
    .widget-badges {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .badge-pro {
      font-size: 9px; 
      background: rgba(0,255,8,0.2); 
      color: #00ff08;
      padding: 1px 4px; 
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .widget-activity-text {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 210px;
    }

    /* Statusfarben für den Punkt im Widget */
    .dot-online { background-color: #43b581; }
    .dot-idle { background-color: #faa61a; }
    .dot-dnd { background-color: #f04747; }
    .dot-offline { background-color: #747f8d; }
    
    /* Kleine runde Social-Icons */
    .social-row {
      display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;
    }
    .social-icon {
      width: 42px; height: 42px; background: rgba(0,255,8,0.15);
      border: 2px solid rgba(0,255,8,0.12); border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      color: #00ff08; text-decoration: none; font-size: 20px;
      transition: all .25s ease; box-shadow: 0 0 10px rgba(0,255,8,0.2);
    }
    .social-icon img {
      width: 22px; height: 22px; object-fit: contain; filter: drop-shadow(0 0 4px #00ff08);
    }
    .social-icon:hover {
      background: rgba(0,255,8,0.3); border-color: #00ff08;
      transform: scale(1.1); box-shadow: 0 0 15px #00ff08;
    }
    
    /* Große Haupt-Buttons unten */
    .btn-list {
      display: flex; flex-direction: column; gap: 15px; width: 100%;
    }
    .links-card {
      background: linear-gradient(90deg, rgba(136, 28, 156, 0.7) 0%, rgba(13, 13, 13, 0.8) 100%);
      border: 2px solid rgba(0,255,8,0.15); padding: 18px 30px; border-radius: 12px;
      color: #00ff08; text-decoration: none; font-weight: 600; font-size: 17px;
      display: flex; align-items: center; justify-content: space-between;
      transition: all .25s ease; box-shadow: 0 0 15px rgba(136, 28, 156, 0.3);
    }
    .links-card:hover {
      background: linear-gradient(90deg, rgba(136, 28, 156, 0.9) 0%, rgba(20, 20, 20, 0.9) 100%);
      border-color: #00ff08; box-shadow: 0 0 25px rgba(0,255,8,0.4); transform: scale(1.02);
    }
    .links-card-left { display: flex; align-items: center; gap: 15px; }
    .links-card-left i { font-size: 20px; width: 24px; text-align: center; }
    .arrow {
      font-size: 14px; color: rgba(0,255,8,0.5); transition: transform .25s ease;
    }
    .links-card:hover .arrow { transform: translateX(5px); color: #00ff08; }

    /* Der originale guns.lol View-Counter unten links */
    .guns-view-counter {
      position: absolute; bottom: 15px; left: 20px;
      font-size: 13px; color: #00ff08; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
      opacity: 0.8; text-shadow: 0 0 5px rgba(0, 255, 8, 0.5);
    }
  </style>
</head>
<body>

  <script>
    const discordId = "434389923869032458"; 

    async function fetchDiscordStatus() {
      try {
        const response = await fetch(`https://api.lanyard.rest/v1/users/${discordId}`);
        const data = await response.json();
        
        if (data.success && data.data) {
          const status = data.data.discord_status;
          const avatar = document.getElementById('avatar');
          const widgetDot = document.getElementById('widget-dot');
          const widgetPfp = document.getElementById('widget-pfp');
          const widgetActivity = document.getElementById('widget-activity');
          
          avatar.className = "avatar-img";
          widgetDot.className = "widget-status-dot";
          widgetActivity.innerText = "currently doing nothing";
          
          // Setzt den Status am großen Bild und am Widget-Punkt parallel
          if (status === "online") {
            avatar.classList.add("status-online");
            widgetDot.classList.add("dot-online");
          } else if (status === "idle") {
            avatar.classList.add("status-idle");
            widgetDot.classList.add("dot-idle");
          } else if (status === "dnd") {
            avatar.classList.add("status-dnd");
            widgetDot.classList.add("dot-dnd");
          } else {
            avatar.classList.add("status-offline");
            widgetDot.classList.add("dot-offline");
          }
          
          // Holt dein echtes Discord-Bild für das Widget
          if (data.data.discord_user && data.data.discord_user.avatar) {
            const pfpHash = data.data.discord_user.avatar;
            widgetPfp.src = `https://cdn.discordapp.com/avatars/${discordId}/${pfpHash}.png`;
          }
          
          // Liest deine Live-Aktivitäten (Spielen / Spotify) aus Discord aus
          if (data.data.activities && data.data.activities.length > 0) {
            const game = data.data.activities.find(a => a.type === 0);
            const spotify = data.data.listening_to_spotify ? data.data.spotify : null;
            const custom = data.data.activities.find(a => a.type === 4);
            
            if (game) {
              widgetActivity.innerText = `playing ${game.name}`;
            } else if (spotify) {
              widgetActivity.innerText = `listening to ${spotify.song}`;
            } else if (custom && custom.state) {
              widgetActivity.innerText = custom.state;
            }
          }
        }
      } catch (error) {
        console.error("Lanyard-Fehler:", error);
      }
    }

    fetchDiscordStatus();
    setInterval(fetchDiscordStatus, 15000);
  </script>
