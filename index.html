<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>reekey</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body, html {
      margin: 0; padding: 0; width: 100%; min-height: 100vh;
      background-color: #050505; color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
      display: flex; justify-content: center; align-items: center;
    }
    
    .bg-layer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #1a0826 0%, #050505 100%);
      z-index: 1;
    }
    
    .main-wrapper {
      position: relative; z-index: 2; width: 100%; max-width: 480px; padding: 20px;
    }
    
    .profile-card {
      width: 100%;
      background: rgba(20, 16, 25, 0.7);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 24px; border: 1px solid rgba(138, 43, 226, 0.2);
      padding: 40px 30px; text-align: center;
      box-shadow: 0 0 40px rgba(138, 43, 226, 0.15);
    }
    
    /* Avatar-Box mit Positionsmarker für den Discord-Status-Punkt */
    .avatar-box {
      width: 120px; height: 120px; margin: 0 auto 24px auto; position: relative;
    }
    .avatar-img {
      width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
      border: 3px solid #4a4a4a; /* Standard-Farbe (Offline) */
      transition: all 0.3s ease;
    }
    
    /* Der kleine Discord-Status-Punkt unten rechts am Avatar */
    .status-dot {
      position: absolute; bottom: 4px; right: 4px;
      width: 24px; height: 24px; border-radius: 50%;
      background-color: #747f8d; border: 4px solid #141019;
      transition: all 0.3s ease;
    }
    
    /* Dynamische Status-Farben (werden per JavaScript gesteuert) */
    .status-online { border-color: #43b581; box-shadow: 0 0 20px #43b581; }
    .status-idle { border-color: #faa61a; box-shadow: 0 0 20px #faa61a; }
    .status-dnd { border-color: #f04747; box-shadow: 0 0 20px #f04747; }
    .status-offline { border-color: #747f8d; }
    
    .dot-online { background-color: #43b581; }
    .dot-idle { background-color: #faa61a; }
    .dot-dnd { background-color: #f04747; }
    .dot-offline { background-color: #747f8d; }
    
    h1 {
      font-size: 32px; font-weight: 700; margin: 0 0 6px 0; color: #ffffff;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .verified-icon {
      color: #9b4dff; font-size: 22px; filter: drop-shadow(0 0 8px #9b4dff);
    }
    
    /* Live Discord-Aktivitätsanzeige unter dem Namen */
    .discord-activity {
      font-size: 14px; color: #b9bbbe; margin: -10px 0 24px 0;
      min-height: 20px; font-style: italic;
    }
    
    .sub-bio {
      color: rgba(255, 255, 255, 0.6); font-size: 15px; margin: 0 0 24px 0;
    }
    
    .social-row {
      display: flex; justify-content: center; margin-bottom: 30px;
    }
    .social-icon {
      width: 40px; height: 40px; background: rgba(255, 255, 255, 0.1);
      border-radius: 50%; display: flex; justify-content: center; align-items: center;
      color: #ffffff; text-decoration: none; font-size: 18px; transition: all .2s ease;
    }
    .social-icon:hover {
      background: rgba(138, 43, 226, 0.4); transform: scale(1.1);
    }
    
    .btn-list {
      display: flex; flex-direction: column; gap: 14px; width: 100%;
    }
    .links-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08); padding: 18px 24px; border-radius: 14px;
      color: #ffffff; text-decoration: none; font-weight: 600; font-size: 16px;
      display: flex; align-items: center; justify-content: space-between;
      transition: all .2s ease;
    }
    .links-card:hover {
      background: rgba(138, 43, 226, 0.15); border-color: rgba(138, 43, 226, 0.4);
      transform: translateY(-2px);
    }
    .links-card-left { display: flex; align-items: center; gap: 16px; }
    .links-card-left i { font-size: 20px; width: 24px; text-align: center; }
    
    .fa-tiktok { color: #ff0050; }
    .fa-star { color: #00afff; }
    .fa-telegram { color: #229ED9; }
    
    .arrow { font-size: 14px; color: rgba(255, 255, 255, 0.3); transition: transform .2s ease; }
    .links-card:hover .arrow { transform: translateX(4px); color: #ffffff; }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="main-wrapper">
    <div class="profile-card">
      
      <div class="avatar-box">
        <img id="avatar" class="avatar-img" src="https://github.com/ReekeyUwU.png" alt="reekey">
        <div id="status" class="status-dot"></div>
      </div>
      
      <h1>reekey<i class="fa-solid fa-circle-check verified-icon"></i></h1>
      
      <div id="activity" class="discord-activity">Offline</div>
      
      <div class="sub-bio">Welcome to my universe</div>
      
      <div class="social-row">
        <a class="social-icon" href="https://t.me/reekeyuwu" target="_blank" title="Telegram"><i class="fab fa-telegram"></i></a>
      </div>
      
      <div class="btn-list">
        <a href="https://tiktok.com/@reekey" target="_blank" class="links-card">
          <div class="links-card-left"><i class="fab fa-tiktok"></i><span>TikTok</span></div>
          <i class="fa-solid fa-chevron-right arrow"></i>
        </a>
        <a href="https://onlyfans.com/reekeyuwu" target="_blank" class="links-card">
          <div class="links-card-left"><i class="fa-solid fa-star"></i><span>OnlyFans</span></div>
          <i class="fa-solid fa-chevron-right arrow"></i>
        </a>
        <a href="https://t.me/reekeyuwu" target="_blank" class="links-card">
          <div class="links-card-left"><i class="fab fa-telegram"></i><span>Telegram Channel</span></div>
          <i class="fa-solid fa-chevron-right arrow"></i>
        </a>
      </div>
      
    </div>
  </div>

  <script>
    const discordId = "344199971935682571"; // Deine Discord-ID

    async function fetchDiscordStatus() {
      try {
        const response = await fetch(`https://api.lanyard.rest/v1/users/${discordId}`);
        const data = await response.json();
        
        if (data.success && data.data) {
          const status = data.data.discord_status;
          const avatar = document.getElementById('avatar');
          const dot = document.getElementById('status');
          const activityEl = document.getElementById('activity');
          
          // Alle alten Klassen entfernen
          avatar.className = "avatar-img";
          dot.className = "status-dot";
          
          // Status-Farbe setzen
          if (status === "online") {
            avatar.classList.add("status-online");
            dot.classList.add("dot-online");
            activityEl.innerText = "Online";
          } else if (status === "idle") {
            avatar.classList.add("status-idle");
            dot.classList.add("dot-idle");
            activityEl.innerText = "Abwesend";
          } else if (status === "dnd") {
            avatar.classList.add("status-dnd");
            dot.classList.add("dot-dnd");
            activityEl.innerText = "Bitte nicht stören";
          } else {
            avatar.classList.add("status-offline");
            dot.classList.add("dot-offline");
            activityEl.innerText = "Offline";
          }
          
          // Aktivität auslesen (Zocken, Spotify, Custom Status)
          if (data.data.activities && data.data.activities.length > 0) {
            // Bevorzugt "Spielt gerade" oder Custom Status anzeigen
            const custom = data.data.activities.find(a => a.type === 4);
            const game = data.data.activities.find(a => a.type === 0);
            const spotify = data.data.listening_to_spotify ? data.data.spotify : null;
            
            if (game) {
              activityEl.innerText = `Spielt gerade ${game.name}`;
            } else if (custom && custom.state) {
              activityEl.innerText = custom.state;
            } else if (spotify) {
              activityEl.innerText = `Hört gerade: ${spotify.song} - ${spotify.artist}`;
            }
          }
        }
      } catch (error) {
        console.error("Fehler beim Laden des Discord-Status:", error);
      }
    }

    // Status sofort laden und alle 15 Sekunden im Hintergrund aktualisieren
    fetchDiscordStatus();
    setInterval(fetchDiscordStatus, 15000);
  </script>
</body>
</html>
