    .bg-layer {

      border: 3px solid #43b581;

      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      border: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }
    .widget-pfp-container {
      position: relative;
      width: 42px; height: 42px;
      flex-shrink: 0;
    }
    .widget-pfp {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    .widget-status-dot {
      position: absolute; bottom: 0; right: 0;
      width: 13px; height: 13px;
      border-radius: 50%;
      background-color: #43b581;
      border: 2px solid rgba(35, 25, 45, 1);
    }
    .widget-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .widget-user-line {
      display: flex;
      align-items: center;

    .widget-badges { display: flex; align-items: center; gap: 4px; }
    .badge-pro {

    .widget-activity-text {
      font-size: 13px; color: rgba(255, 255, 255, 0.6);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 210px;
    }
    
    /* Social Icons Row */
    .social-row {

    }
    .social-icon {
      width: 42px; height: 42px; background: rgba(0,255,8,0.15);
      border: 2px solid rgba(0,255,8,0.12); border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      color: #00ff08; text-decoration: none; font-size: 20px;
      transition: all .25s ease; box-shadow: 0 0 10px rgba(0,255,8,0.2);
      cursor: pointer;
    }
    .social-icon:hover {
      background: rgba(0,255,8,0.3); border-color: #00ff08;
      transform: scale(1.1); box-shadow: 0 0 15px #00ff08;
    }
    
    /* Buttons */
    .btn-list { display: flex; flex-direction: column; gap: 15px; width: 100%; }
    .links-card {
      background: linear-gradient(90deg, rgba(136, 28, 156, 0.7) 0%, rgba(13, 13, 13, 0.8) 100%);

      color: #00ff08; text-decoration: none; font-weight: 600; font-size: 17px;

      background: rgba(5, 5, 5, 0.95); z-index: 9999;

    }
    .age-gate-box { background: #111; border: 2px solid #00ff08; border-radius: 20px; padding: 40px; text-align: center; }
  </style>
</head>
