    .social-icon { width: 42px; height: 42px; background: rgba(0,255,8,0.15); border: 2px solid rgba(0,255,8,0.12); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #00ff08; font-size: 20px; }
    .social-icon img { width: 22px; height: 22px; }
    .links-card { background: linear-gradient(90deg, rgba(136, 28, 156, 0.7) 0%, rgba(13, 13, 13, 0.8) 100%); border: 2px solid rgba(0,255,8,0.15); padding: 18px 30px; border-radius: 12px; color: #00ff08; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; margin-bottom: 15px; }
    .badge-18 { font-size: 11px; background: rgba(240, 15, 214, 0.3); color: #fff; padding: 2px 6px; border-radius: 6px; }
    .age-gate-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 5, 0.95); z-index: 9999; display: none; justify-content: center; align-items: center; }
    .age-gate-box { background: #111; border: 2px solid #00ff08; border-radius: 20px; padding: 40px; text-align: center; }
  </style>
</head>
<body>

        <a class="social-icon" onclick="track('TikTok', 'https://tiktok.com/@reekey')"><i class="fab fa-tiktok"></i></a>
        <a class="social-icon" onclick="track('Bluesky', 'https://bsky.app/profile/reekey.de')"><img src="https://cdn.simpleicons.org/bluesky"></a>
        <a class="social-icon" onclick="track('Telegram', 'https://t.me/reekeyuwu')"><i class="fab fa-telegram"></i></a>
        <a class="social-icon" onclick="gate('https://t.me/reekeyad', 'Telegram_Ads')"><i class="fab fa-telegram" style="color:orange;"></i></a>

        <a class="social-icon" onclick="track('Kyra', 'https://t.me/KyraFoxworks')"><img src="https://r2.guns.lol/8caa2f3b-b000-4470-bdd4-e6a1e7d9e48e.webp"></a>
      </div>
      
      <div class="btn-list">
        <div class="links-card" onclick="gate('https://onlyfans.com/reekeyuwu', 'OnlyFans')">
            <span><i class="fab fa-onlyfans" style="margin-right:10px;"></i>OnlyFans</span><span class="badge-18">18+</span>
        </div>
        <div class="links-card" onclick="track('X_Twitter', 'https://x.com/reekey_')">
            <span><i class="fab fa-x-twitter" style="margin-right:10px;"></i>X (Twitter)</span>

        </div>

    </div>

  <script>
    let url = "";
    function track(name, u) {
        fetch('https://link-tracker.morning-surf-02e1.workers.dev/track', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({link: name})
        }).catch(e => console.error(e));
        if(u) window.open(u, '_blank');
    }
    function gate(u, name) { 
      url = u;
      fetch('https://link-tracker.morning-surf-02e1.workers.dev/track', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({link: name})
      }).catch(e => console.error(e));
      document.getElementById('age-gate').style.display='flex'; 
    }
    function hide() { document.getElementById('age-gate').style.display='none'; }
    function go() { window.open(url, '_blank'); hide(); }
  </script>
</body>
