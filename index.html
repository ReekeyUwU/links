<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>reekey</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --neon: #00ff08; --bg: #050505; --card: rgba(20, 20, 20, 0.8); }
    body { margin: 0; background-color: var(--bg); color: var(--neon); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
    
    .container { width: 100%; max-width: 500px; text-align: center; }
    .avatar { width: 120px; height: 120px; border-radius: 20px; border: 2px solid var(--neon); margin-bottom: 15px; object-fit: cover; }
    
    .dc-widget { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 15px; margin: 20px 0; display: flex; align-items: center; gap: 15px; cursor: pointer; text-decoration: none; color: white; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; background: grey; }
    
    .socials { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .btn { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; color: var(--neon); font-weight: bold; }
    
    /* Custom Modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
    .modal-content { background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--neon); }
  </style>
</head>
<body>

  <div class="container">
    <img src="https://r2.guns.lol/315ca1f2-f200-4a1c-863b-e412a4d7903c.webp" class="avatar">
    <h1>reekey <i class="fa-solid fa-circle-check" style="font-size: 18px;"></i></h1>

    <a href="https://discord.com/users/434389923869032458" class="dc-widget">
      <img src="https://r2.guns.lol/315ca1f2-f200-4a1c-863b-e412a4d7903c.webp" style="width:40px; border-radius:50%">
      <div><div>reekey_</div><div id="status" style="font-size: 12px; color: grey;">Status wird geladen...</div></div>
      <div id="dot" class="status-dot"></div>
    </a>

    <div class="socials">
        <a href="https://discord.com/invite/nRTbXGepUT" class="social-icon" style="padding:10px;"><i class="fab fa-discord"></i></a>
        <a onclick="openGate('https://t.me/reekeyad')" class="social-icon" style="padding:10px; cursor:pointer;"><i class="fab fa-telegram" style="color:orange;"></i></a>
        </div>

    <div class="btn" onclick="openGate('https://onlyfans.com/reekeyuwu')">OnlyFans <span>18+</span></div>
    <div class="btn" onclick="openGate('https://t.me/s/reekeyuwu')">Telegram Channel <span>18+</span></div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <h2>18+ Bestätigung</h2>
      <button onclick="confirm()" class="btn">Ja, ich bin über 18</button>
      <button onclick="closeModal()" class="btn" style="background:transparent; border:none;">Schließen</button>
    </div>
  </div>

  <script>
    let dest = "";
    function openGate(url) { dest = url; document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function confirm() { window.open(dest, '_blank'); closeModal(); }

    // Status Abfrage
    fetch('https://api.lanyard.rest/v1/users/434389923869032458')
      .then(r => r.json()).then(d => {
        const s = d.data.discord_status;
        document.getElementById('status').innerText = s.charAt(0).toUpperCase() + s.slice(1);
        document.getElementById('dot').style.background = (s==='online'?'#00ff08':'grey');
      });
  </script>
</body>
</html>
