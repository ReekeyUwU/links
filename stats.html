<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Link-Statistiken</title>
    <style>
        body { background: #050505; color: #00ff08; font-family: sans-serif; display: flex; justify-content: center; padding: 40px; }
        .box { background: rgba(240, 15, 214, 0.15); padding: 30px; border-radius: 20px; border: 2px solid #00ff08; width: 100%; max-width: 500px; }
        .row { background: rgba(0,0,0,0.4); padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Link-Statistiken</h1>
        <div id="stats-container">Lade Daten...</div>
    </div>
    <script>
        fetch('https://link-tracker.morning-surf-02e1.workers.dev/stats')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('stats-container');
                container.innerHTML = Object.entries(data).map(([link, clicks]) => `
                    <div class="row"><span>${link}</span><b>${clicks} Klicks</b></div>
                `).join('');
            });
    </script>
</body>
</html>
