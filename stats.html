<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>reekey | Live-Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            height: 100dvh; 
            background-color: #050505; 
            color: #00ff08; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden !important; 
        }
        
        .bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: url("https://reekey.de/84bdc93d-a924-42a8-829d-8ceafa6314fd.webp"); background-size: cover; background-position: center; background-attachment: fixed; z-index: 1; pointer-events: none; }
        
        .main-wrapper { 
            position: relative; 
            z-index: 2; 
            height: 100%; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 10px; 
        }
        
        #pw-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(5, 5, 5, 0.96); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
            padding: 20px;
        }
        
        .login-box {
            background: #111; 
            border: 2px solid #00ff08; 
            border-radius: 20px; 
            padding: 30px 20px; 
            text-align: center; 
            width: 100%; 
            max-width: 360px;
            box-shadow: 0 0 25px rgba(0, 255, 8, 0.2);
        }
        
        .login-box h2 { color: white; margin: 0 0 20px 0; font-size: 20px; }
        .login-box div { display: flex; flex-direction: column; gap: 12px; }
        
        input { 
            padding: 12px 16px; 
            border-radius: 10px; 
            border: 1px solid rgba(0, 255, 8, 0.4); 
            background: rgba(0, 0, 0, 0.6); 
            color: #00ff08; 
            font-size: 15px;
            outline: none;
            text-align: center;
        }
        
        .login-btn { 
            padding: 12px; 
            border-radius: 30px; 
            background: #00ff08; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 15px;
            color: #000;
        }
        
        .profile-card { 
            width: 100%; 
            max-width: 540px; 
            height: 96vh; /* Fest fixierte Höhe basierend auf dem Screen */
            background: rgba(240, 15, 214, 0.15); 
            backdrop-filter: blur(7px); 
            -webkit-backdrop-filter: blur(7px); 
            border-radius: 20px; 
            border: 2px solid rgba(240, 15, 214, 0.1); 
            padding: 15px; 
            text-align: center; 
            position: relative; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden !important;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        h1 { font-size: 22px; font-weight: 600; margin: 0 0 8px 0; color: #00ff08; display: inline-flex; align-items: center; gap: 8px; text-shadow: 0 0 10px #00ff08; justify-content: center; flex-shrink: 0; }
        
        .views-header { 
            text-align: center; 
            margin-bottom: 10px; 
            color: #fff; 
            font-size: 15px; 
            font-weight: bold; 
            padding: 8px; 
            background: rgba(0, 255, 8, 0.1); 
            border-radius: 10px; 
            border: 1px solid rgba(0, 255, 8, 0.2);
            flex-shrink: 0;
        }
        
        /* Flexibler Container für das Diagramm */
        .chart-container {
            position: relative;
            width: 100%;
            height: 180px; /* Reduzierte feste Höhe, damit es nicht drückt */
            flex-shrink: 0;
            margin-bottom: 10px;
        }
        
        /* Listen-Bereich staucht sich jetzt automatisch, anstatt zu scrollen */
        .stats-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-grow: 1;
            justify-content: flex-start;
            overflow: hidden !important; /* Absolutes Scroll-Verbot */
        }
        
        .row { 
            background: linear-gradient(90deg, rgba(136, 28, 156, 0.3) 0%, rgba(13, 13, 13, 0.6) 100%);
            padding: 8px 14px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid rgba(0, 255, 8, 0.15);
            font-size: 13.5px;
            flex-shrink: 1; /* Erlaubt den Zeilen, kompakter zu werden */
        }
        .row span { font-weight: 600; color: #00ff08; text-transform: capitalize; }
        .row b { color: #fff; background: rgba(240, 15, 214, 0.3); padding: 2px 6px; border-radius: 5px; font-size: 11px; }
        
        .logout-btn { 
            background: #222; 
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            flex-shrink: 0;
            margin-top: 5px;
        }
        
        .footer { margin-top: 8px; color: rgba(0, 255, 8, 0.5); font-size: 11px; padding-top: 8px; border-top: 1px solid rgba(0, 255, 8, 0.15); text-align: center; flex-shrink: 0; }
        .footer a { color: #00ff08; text-decoration: none; }

        /* Extra Stauchung für sehr niedrige Bildschirme */
        @media (max-height: 680px) {
            .chart-container { height: 130px; }
            h1 { font-size: 18px; margin-bottom: 4px; }
            .views-header { padding: 6px; font-size: 13px; margin-bottom: 6px; }
            .row { padding: 6px 12px; font-size: 12.5px; }
        }
    </style>
</head>
<body>

    <div id="pw-overlay">
        <div class="login-box">
            <h2>Live-Stats Access</h2>
            <div>
                <input type="password" id="pw-input" placeholder="Passwort eingeben">
                <button class="login-btn" onclick="checkPassword()">Login</button>
            </div>
        </div>
    </div>

    <div class="bg-layer"></div>
    <div class="main-wrapper">
        <div class="profile-card" id="stats-content" style="display:none;">
            
            <div>
                <h1><i class="fa-solid fa-chart-simple"></i> Live-Statistiken</h1>
                <div class="views-header" id="page-views">Gesamt-Aufrufe: Lade...</div>
            </div>
            
            <!-- Feste Chart Box -->
            <div class="chart-container">
                <canvas id="statsChart"></canvas>
            </div>
            
            <!-- Liste blockiert jegliches Scrollen -->
            <div class="stats-list" id="stats-container">
                Lade Link-Daten...
            </div>
            
            <div>
                <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Ausloggen</button>
                <div class="footer">
                    © 2026 | <a href="https://reekey.de">reekey.de</a>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        const PASSWORT = "Reekey@1"; 

        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            showStats();
        }

        document.getElementById('pw-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPassword();
        });

        function checkPassword() {
            if (document.getElementById('pw-input').value === PASSWORT) {
                sessionStorage.setItem('isLoggedIn', 'true');
                showStats();
            } else {
                alert("Falsches Passwort!");
            }
        }

        function showStats() {
            document.getElementById('pw-overlay').style.display = 'none';
            document.getElementById('stats-content').style.display = 'flex';
            loadStats();
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            location.reload();
        }

        function loadStats() {
            fetch('https://link-tracker.morning-surf-02e1.workers.dev/stats')
                .then(res => res.json())
                .then(data => {
                    const views = data['reekey_de_views'] || 0;
                    document.getElementById('page-views').innerText = "Gesamt-Aufrufe: " + views.toLocaleString();
                    
                    const listData = Object.entries(data)
                        .filter(e => e[0] !== 'reekey_de_views')
                        .sort((a, b) => b[1] - a[1]);
                    
                    const container = document.getElementById('stats-container');
                    container.innerHTML = listData.map(([link, clicks]) => `
                        <div class="row">
                            <span>${link.replace(/_/g, ' ')}</span>
                            <b>${clicks} Klicks</b>
                        </div>
                    `).join('');

                    new Chart(document.getElementById('statsChart'), {
                        type: 'bar',
                        data: {
                            labels: listData.map(e => e[0].replace(/_/g, ' ')),
                            datasets: [{ 
                                label: 'Klicks', 
                                data: listData.map(e => e[1]), 
                                backgroundColor: '#00ff08',
                                borderRadius: 4,
                                hoverBackgroundColor: '#fff'
                            }]
                        },
                        options: { 
                            indexAxis: 'y', 
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: {
                                    grid: { color: 'rgba(0, 255, 8, 0.08)' },
                                    ticks: { color: 'rgba(0, 255, 8, 0.6)', font: { size: 9 } }
                                },
                                y: {
                                    grid: { display: false },
                                    ticks: { color: '#00ff08', font: { size: 10, weight: 'bold' } }
                                }
                            }
                        }
                    });
                });
        }
    </script>
</body>
</html>
