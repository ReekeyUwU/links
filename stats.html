<script>
    let url = "";

    // Tracker-Funktion für alle Links
    function track(name, u) {
      fetch('https://link-tracker.morning-surf-02e1.workers.dev/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ link: name })
      }).catch(e => console.error("Tracking error:", e));
      
      if (u) window.open(u, '_blank');
    }

    // Gate-Funktion für 18+ Links
    function gate(u, name) { 
      url = u; 
      fetch('https://link-tracker.morning-surf-02e1.workers.dev/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ link: name })
      }).catch(e => console.error("Tracking error:", e));
      document.getElementById('age-gate').style.display='flex'; 
    }
    
    function hide() { document.getElementById('age-gate').style.display='none'; }
    function go() { window.open(url, '_blank'); hide(); }
    
    // AUTO-TRACKING: Zählt jeden Seitenaufruf von reekey.de
    fetch('https://link-tracker.morning-surf-02e1.workers.dev/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ link: 'reekey_de_views' })
    });

    // View Counter laden (holt den aktuellen Stand)
    fetch('https://link-tracker.morning-surf-02e1.workers.dev/stats')
      .then(res => res.json())
      .then(data => {
          document.getElementById('view-count').innerText = data['reekey_de_views'] || 0;
      })
      .catch(err => { document.getElementById('view-count').innerText = "—"; });

    // Lanyard Status (Discord Widget)
    async function updateStatus() {
        try {
            const res = await fetch('https://api.lanyard.rest/v1/users/1104903295438434365');
            const json = await res.json();
            if (json.success) {
                const d = json.data;
                const dot = document.getElementById('widget-dot');
                const text = document.getElementById('widget-activity');
                const colors = { 'online': '#43b581', 'idle': '#faa61a', 'dnd': '#f04747', 'offline': '#747f8d' };
                if(dot) dot.style.backgroundColor = colors[d.discord_status] || '#747f8d';
                text.innerText = d.spotify ? `🎵 ${d.spotify.song}` : (d.activities[0]?.name || 'Online');
            }
        } catch(e) {}
    }
    updateStatus();
    setInterval(updateStatus, 10000);
  </script>
